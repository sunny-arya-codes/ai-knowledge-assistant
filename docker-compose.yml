services:
  ollama:
    image: alpine/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama    
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # Automatically pulls the LLM model on fresh installations
  ollama-pull:
    image: alpine/ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Ollama to start...' &&
      while ! ollama list; do sleep 2; done &&
      echo 'Pulling llama3.2 model...' &&
      ollama pull llama3.2 &&
      echo 'Model pulled successfully!'
      "
    depends_on:
      - ollama

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434  
    volumes:
      - ./backend/documents:/app/documents     
      - chroma_data:/app/chroma_db             
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  ollama_data:      
  chroma_data:      
